version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8080}
    depends_on:
      - api-gateway

  api-gateway:
    build: ./api-gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-demand_forecast}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-app}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - ML_SERVICE_URL=${ML_SERVICE_URL:-http://ml-service:8000}
    depends_on:
      - db
      - ml-service

  ml-service:
    build: ./ml-service
    ports:
      - "${ML_SERVICE_PORT:-8000}:8000"
    environment:
      - MODEL_PATH=${MODEL_PATH:-/app/data/models}
    volumes:
      - ./data:/app/data:ro

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-demand_forecast}
      - POSTGRES_USER=${POSTGRES_USER:-app}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres_data:
